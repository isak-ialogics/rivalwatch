name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rivalwatch_test
          POSTGRES_USER: rivalwatch
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql,redis
          coverage: none

      - name: Copy .env
        run: cp .env.example .env.testing

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run migrations
        env:
          DB_DATABASE: rivalwatch_test
          DB_USERNAME: rivalwatch
          DB_PASSWORD: testpass
          DB_HOST: localhost
        run: php artisan migrate:fresh --env=testing

      - name: Run tests
        env:
          DB_DATABASE: rivalwatch_test
          DB_USERNAME: rivalwatch
          DB_PASSWORD: testpass
          DB_HOST: localhost
        run: php artisan test

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: app

  deploy-swarm:
    name: Deploy to Docker Swarm
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        env:
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${VPS_USER}@${VPS_HOST}" \
            DEPLOY_TOKEN="${DEPLOY_TOKEN}" IMAGE="${IMAGE}" GH_ACTOR="${GH_ACTOR}" \
            bash -s << 'EOF'
          set -e

          echo "${DEPLOY_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

          docker pull "${IMAGE}"

          # Update or create swarm services with the latest image
          if sudo docker service ls --filter name=rivalwatch_app >/dev/null 2>&1; then
            echo "Updating existing RivalWatch services..."
            sudo docker service update --force --with-registry-auth --image "${IMAGE}" rivalwatch_app
            sudo docker service update --force --with-registry-auth --image "${IMAGE}" rivalwatch_horizon 2>/dev/null || true
            sudo docker service update --force --with-registry-auth --image "${IMAGE}" rivalwatch_scheduler 2>/dev/null || true
          else
            echo "Creating new RivalWatch services..."
            # This will be handled by manual setup or separate task
            echo "Warning: RivalWatch services not found. Please ensure services are created via VPS setup."
          fi

          echo "Service status:"
          sudo docker service ls | grep rivalwatch || echo "No RivalWatch services found"
          EOF
