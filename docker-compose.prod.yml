# ============================================================
# Docker Networks (Swarm overlay)
# ============================================================
networks:
  traefik-public:
    external: true
  rivalwatch-internal:
    driver: overlay
    attachable: true

# ============================================================
# Persistent Volumes
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================================
# Services
# ============================================================
services:

  # ----------------------------------------------------------
  # Laravel App (PHP-FPM + Nginx)
  # ----------------------------------------------------------
  app:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-isak-ialogics/rivalwatch}:${IMAGE_TAG:-latest}
    networks:
      - traefik-public
      - rivalwatch-internal
    volumes:
      - ./storage:/var/www/html/storage
    environment:
      APP_NAME: ${APP_NAME:-RivalWatch}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://rivalwatch.vigilmon.online}
      TRUSTED_PROXIES: "*"
      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-rivalwatch}
      DB_USERNAME: ${DB_USERNAME:-rivalwatch}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        - "traefik.http.routers.rivalwatch.rule=Host(`rivalwatch.vigilmon.online`)"
        - "traefik.http.routers.rivalwatch.entrypoints=websecure"
        - "traefik.http.routers.rivalwatch.tls=true"
        - "traefik.http.routers.rivalwatch.tls.certresolver=le"
        - "traefik.http.services.rivalwatch.loadbalancer.server.port=80"
        - "traefik.http.services.rivalwatch.loadbalancer.healthcheck.path=/up"
        - "traefik.http.services.rivalwatch.loadbalancer.healthcheck.interval=10s"
        - "traefik.http.routers.rivalwatch-http.rule=Host(`rivalwatch.vigilmon.online`)"
        - "traefik.http.routers.rivalwatch-http.entrypoints=web"
        - "traefik.http.routers.rivalwatch-http.middlewares=rivalwatch-redirect"
        - "traefik.http.routers.rivalwatch-http.service=rivalwatch"
        - "traefik.http.middlewares.rivalwatch-redirect.redirectscheme.scheme=https"

  # ----------------------------------------------------------
  # Horizon Queue Worker
  # ----------------------------------------------------------
  horizon:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-isak-ialogics/rivalwatch}:${IMAGE_TAG:-latest}
    networks:
      - rivalwatch-internal
    volumes:
      - ./storage:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://rivalwatch.vigilmon.online}
      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-rivalwatch}
      DB_USERNAME: ${DB_USERNAME:-rivalwatch}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_CONNECTION: redis
    command: ["php", "/var/www/html/artisan", "horizon"]
    healthcheck:
      test: ["CMD-SHELL", "php /var/www/html/artisan horizon:status | grep -q running || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  # ----------------------------------------------------------
  # Scheduler
  # ----------------------------------------------------------
  scheduler:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-isak-ialogics/rivalwatch}:${IMAGE_TAG:-latest}
    networks:
      - rivalwatch-internal
    volumes:
      - ./storage:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://rivalwatch.vigilmon.online}
      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-rivalwatch}
      DB_USERNAME: ${DB_USERNAME:-rivalwatch}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_CONNECTION: redis
    command: ["php", "/var/www/html/artisan", "schedule:work"]
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep 'schedule:work' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ----------------------------------------------------------
  # PostgreSQL 16
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    networks:
      - rivalwatch-internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE:-rivalwatch}
      POSTGRES_USER: ${DB_USERNAME:-rivalwatch}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-rivalwatch} -d ${DB_DATABASE:-rivalwatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
      placement:
        constraints:
          - node.role == manager

  # ----------------------------------------------------------
  # Redis 7
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    networks:
      - rivalwatch-internal
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
      placement:
        constraints:
          - node.role == manager
